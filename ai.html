<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium AI Chatbot</title>
    <style>
        /* --- 1. MODERN & PREMIUM CSS DESIGN --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c20 0%, #15102a 50%, #060409 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #e2e8f0;
        }

        /* Glassmorphism Container */
        .chat-container {
            width: 440px;
            height: 600px;
            background: rgba(23, 17, 41, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 
                        0 0 40px rgba(139, 92, 246, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header Area */
        .chat-header {
            padding: 20px;
            background: rgba(13, 9, 26, 0.5);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.5);
        }

        .header-info h2 {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #fff;
        }

        .header-info p {
            font-size: 0.75rem;
            color: #10b981;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .header-info p::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 8px #10b981;
        }

        /* Chat Display Box */
        .chat-box {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .chat-box::-webkit-scrollbar {
            width: 6px;
        }
        .chat-box::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        /* Message Styles with Animations */
        .message {
            padding: 12px 16px;
            border-radius: 16px;
            max-width: 80%;
            font-size: 0.95rem;
            line-height: 1.5;
            animation: fadeIn 0.3s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.2);
        }

        .ai-message {
            background: rgba(255, 255, 255, 0.06);
            color: #e2e8f0;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* Input Bar Footer */
        .input-container {
            display: flex;
            padding: 16px 20px;
            background: rgba(13, 9, 26, 0.6);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            align-items: center;
            gap: 12px;
        }

        .input-container input {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-container input:focus {
            border-color: #8b5cf6;
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.15);
        }

        .input-container button {
            background: linear-gradient(135deg, #8b5cf6, #d946ef);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
        }

        .input-container button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <div class="avatar">🤖</div>
            <div class="header-info">
                <h2>MovieFlix AI</h2>
                <p>Online</p>
            </div>
        </div>
        <div class="chat-box" id="chatBox">
            <div class="message ai-message">Hello! Main aapka personal AI assistant hoon. Aaj hum kya behtareen cheez code karne wale hain?</div>
        </div>
        <div class="input-container">
            <input type="text" id="userInput" placeholder="Kuch naya poochiye..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        function handleKeyPress(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        }

        function sendMessage() {
            let inputField = document.getElementById("userInput");
            let userText = inputField.value.trim();

            if (userText === "") return;

            // User ka message screen par dikhana
            appendMessage(userText, "user-message");
            inputField.value = "";

            // AI ka reply thode delay ke baad aana
            setTimeout(() => {
                let aiReply = getAIResponse(userText);
                appendMessage(aiReply, "ai-message");
            }, 500);
        }

        function appendMessage(text, className) {
            let chatBox = document.getElementById("chatBox");
            let messageDiv = document.createElement("div");
            messageDiv.className = `message ${className}`;
            
            // CRITICAL: innerHTML use kiya hai taaki links clickable ban sakein
            messageDiv.innerHTML = text; 
            
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // AI Responses jisme HTML Links added hain
        function getAIResponse(query) {
            let text = query.toLowerCase();

            if (text.includes("hello") || text.includes("hi") || text.includes("hey")) {
                return "Hey there! Kaise hain aap? Mujhse koi bhi sawal poochiye ya <b>link</b> mangiye!";
            } 
            else if (text.includes("kaise ho") || text.includes("how are you")) {
                return "Main bilkul badiya hoon! Aapka naya interface dekh kar maza aa gaya. 😎";
            } 
            // Link Example 1: Google
            else if (text.includes("google") || text.includes("search")) {
                return "Aap kuch bhi search karne ke liye <a href='https://www.google.com' target='_blank' style='color: #a6e3a1; font-weight: bold; text-decoration: underline;'>Google</a> par ja sakte hain.";
            }
            // Link Example 2: GitHub / Website
            else if (text.includes("website") || text.includes("link") || text.includes("github")) {
                return "Mera source code aur projects dekhne ke liye is link par click karein: <br> 1.<a href='https://github.com' target='_blank' style='color: #89b4fa; font-weight: bold; text-decoration: underline;'>Open GitHub</a> <br> 2.<a href='https://www.netlify.com/' target='_blank' style='color: #89b4fa; font-weight: bold; text-decoration: underline;'>open netlify</a>";
            }
            else if (text.includes("time")) {
                return "Abhi ka exact time hai: " + new Date().toLocaleTimeString();
            }

            else if (text.includes("movies") || text.includes("drama") || text.includes("series") || text.includes("anime")) {
                return "this telegram bot link isme all movie , anime , drama , series , milate hai <br> 1.<a href='https://t.me/allmovie8u_bot' target='_blank' style='color: #89b4fa; font-weight: bold; text-decoration: underline;'>movie8u bot</a>";
            }
            else if (text.includes("bye")) {
                return "Alvida! Jab bhi kuch naya seekhna ho, mujhe yaad kijiyega!";
            } 
            else {
                return "muje kuch samajh nahi aaya. isko message kar sakte hain:<br> <a href='https://t.me/movie8u' target='_blank' style='color: #89b4fa; font-weight: bold; text-decoration: underline;'>owner</a>";
            }
        }
    </script>
</body>
</html>
